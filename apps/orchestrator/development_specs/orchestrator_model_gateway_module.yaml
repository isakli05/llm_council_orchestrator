module:
  name: "orchestrator_model_gateway"
  layer: "integration_layer"
  root_dir: "apps/orchestrator/src"
  description: >
    Farklı LLM sağlayıcıları (GPT, Claude, GLM, Gemini, Grok, vs.) ile konuşmak için
    tek bir unified interface sağlayan katman.

scope:
  responsibilities:
    - "Model kimliğine göre doğru provider adapter’ını seçmek."
    - "Tekli ve çoklu (paralel) model çağrılarını yönetmek."
    - "Timeout, retry ve basit rate limit kontrolü yapmak."
  non_responsibilities:
    - "Rol bazlı prompt oluşturmak (RoleManager sorumluluğu)."
    - "Response’ları birleştirmek (Aggregator sorumluluğu)."

files:
  - "src/models/ModelGateway.ts"
  - "src/models/types.ts"
  - "src/models/providers/*.ts"    # provider bazlı adapter’lar (ileride)

providers:
  - "openai/gpt-5.1"
  - "anthropic/claude-opus-4.5"
  - "anthropic/claude-sonnet-4.5"
  - "glm-4.6"
  - "gemini-3"
  - "grok-latest"

interface:
  - name: "callModel"
    params:
      - "modelId: string"
      - "messages: ChatMessage[]"
      - "options?: { temperature?: number; maxTokens?: number; timeoutMs?: number }"
    returns: "Promise<ModelResponse>"

error_handling:
  - "Timeout ve network hataları retry policy ile yönetilmeli."
  - "Permanent hata durumunda RoleManager’a structured error dönülmeli."
